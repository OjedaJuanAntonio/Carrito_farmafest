server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # Assets con hash: cache inmutable
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Datos: siempre revalidar (los precios cambian durante el evento)
    location /data/ {
        add_header Cache-Control "no-cache";
    }

    # Service worker: nunca cachear (controla las actualizaciones de la app)
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/index.html $uri.html /404.html;
    }
}
